<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJ Set</title>
  <link rel="stylesheet" href="estilos.css">
</head>
<body>
  <nav>
    <h2>DJ Set</h2>
    <div>
      <a href="#servicios">Servicios</a>
      <a href="#mesas">Mesas</a>
      <a href="#contacto">Contacto</a>
    </div>
  </nav>

  <header>
    <div>
      <p>DJ para eventos</p>
      <h1>Servicios de DJ y mesas de trabajo</h1>
      <span>Una página sencilla conectada a un backend hecho con Express.</span>
    </div>
  </header>

  <main>
    <section id="servicios">
      <h2>Servicios</h2>
      <div class="grid" id="servicios-lista"></div>
    </section>

    <section id="mesas">
      <h2>Mesas</h2>
      <div class="grid" id="mesas-lista"></div>
    </section>

    <section id="contacto">
      <h2>Contacto</h2>
      <form id="form">
        <input id="nombre" placeholder="Nombre" required>
        <input id="correo" type="email" placeholder="Correo" required>
        <input id="telefono" placeholder="Teléfono">
        <select id="tipo">
          <option value="servicio">Servicio DJ</option>
          <option value="mesa">Mesa de trabajo</option>
          <option value="general">General</option>
        </select>
        <textarea id="mensaje" placeholder="Mensaje" required></textarea>
        <button>Enviar</button>
      </form>
      <p id="aviso"></p>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
